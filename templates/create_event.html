<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Event | Clipora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <nav class="app-nav">
        <a class="brand" href="{{ url_for('home') }}">Clipora</a>
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('upload') }}">Upload</a>
            <a href="{{ url_for('logout') }}">Logout</a>
        </div>
    </nav>

    <main class="page-shell narrow">
        <section class="page-header">
            <p class="eyebrow">New event</p>
            <h1>Create Event</h1>
            <p>Make a new event space and get a QR code guests can use to upload media.</p>
        </section>

        {% if error %}
            <p class="alert">{{ error }}</p>
        {% endif %}

        <form class="upload-card" method="POST">
            <label for="name">Event name</label>
            <input id="name" type="text" name="name" placeholder="Event name" required>
            <button class="button primary full" type="submit">Create Event</button>
        </form>
    </main>
</body>
</html>
