<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ event[1] }}</title>
</head>

<body>

<h1>{{ event[1] }}</h1>

<p>Upload photos and videos from this event.</p>

<h2>Add Media</h2>

<form method="POST" enctype="multipart/form-data">

    <input 
        type="file" 
        name="media"
        accept="image/*,video/*"
        required
    >

    <br><br>

    <button type="submit">
        Upload
    </button>

</form>

<hr>

<h2>Event Gallery</h2>
{% if media %}
    {% for file in media %}
        {% if file[0].lower().endswith(("mp4","mov","webm")) %}

            <video width="300" controls>
                <source 
                src="{{ url_for(
                    'static',
                    filename='uploads/' + event_code + '/' + file[0]
                ) }}">
            </video>

        {% else %}
            <img
            src="{{ url_for(
                'static',
                filename='uploads/' + event_code + '/' + file[0]
            ) }}"
            width="300">
        {% endif %}
        <p>
            Uploaded: {{ file[1] }}
        </p>

        <hr>
    {% endfor %}

{% else %}
    <p>No media uploaded yet.</p>
{% endif %}

</body>

</html>
