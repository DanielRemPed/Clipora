<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload File</title>
</head>

<body>

    <h1>Upload files here</h1>
    <p>Guests can upload files</p>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    {% if events %}

        <form method="POST" enctype="multipart/form-data">

            <label>Select Event:</label>

            <select name="event_id" required>

                <option value="" disabled
                    {% if not selected_event %}
                        selected
                    {% endif %}
                >
                    -- Select an Event --
                </option>

                {% for event in events %}

                    <option 
                        value="{{ event[0] }}"
                        {% if selected_event and selected_event|int == event[0] %}
                            selected
                        {% endif %}
                    >
                        {{ event[1] }}
                    </option>

                {% endfor %}

            </select>

            <br><br>

            <label>Select Media:</label>

            <input 
                type="file" 
                name="media" 
                accept="image/*,video/*" 
                required
            >

            <br><br>

            <button type="submit">
                Upload
            </button>

        </form>

    {% else %}

        <p>You need to create an event before uploading media.</p>

        <a href="{{ url_for('create_event') }}">
            Create New Event
        </a>

    {% endif %}

    <br><br>

    <a href="{{ url_for('dashboard') }}">
        Back to Dashboard
    </a>

    <br>

    <a href="{{ url_for('home') }}">
        Back to Home
    </a>

</body>
</html>
