<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>
    Upload to {{ event[1] }}
    </h1>

    {% if success %}
        <p style="color: green;">
            {{ success }}
        </p>
    {% endif %}

    <form method="POST" enctype="multipart/form-data">

    <input 
    type="file"
    name="media"
    accept="image/*,video/*"
    required
    >

    <br><br>

    <button type="submit">
        Upload Another
    </button>

    </form>

</body>
</html>
