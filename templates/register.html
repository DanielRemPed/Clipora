<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Clipora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <main class="auth-shell">
        <section class="auth-panel">
            <a class="brand auth-brand" href="{{ url_for('home') }}">Clipora</a>
            <p class="eyebrow">Start collecting</p>
            <h1>Create an account</h1>

            {% if error %}
                <p class="alert">{{ error }}</p>
            {% endif %}

            <form class="form-card" method="POST">
                <label for="username">Username</label>
                <input id="username" type="text" name="username" required>

                <label for="password">Password</label>
                <input id="password" type="password" name="password" required>

                <button class="button primary full" type="submit">Register</button>
            </form>

            <p class="auth-note">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
            <a class="text-link" href="{{ url_for('home') }}">Back to home</a>
        </section>
    </main>
</body>
</html>
