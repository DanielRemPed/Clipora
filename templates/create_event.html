<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Create Event</h1>

    {% if error %}
    <p style="color:red">{{error}}</p>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Event name"
            required
        >

        <button type="submit">
            Create Event
        </button>
    </form>
</body>
</html>
