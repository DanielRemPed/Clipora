<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Host Dashboard</title>
</head>
<body>
    <h1>Dashboard</h1>

    <p>Welcome to your dashboard!</p>

    <a href="{{ url_for('upload') }}">Upload File</a>
    <br>
    <a href="{{ url_for('home') }}">Back Home</a>

    <hr>

    {% if files %}
        {% for file in files %}
            <div>
                 <h3> {{filename}}</h3>

                 {% if file.is_video %}
                    <video width"300" controls>
                        source src="{{ file.url }}">
                    </video>
                {% else %}
                    <img src="{{ file.url }}" alt="{{ file.filename }}" width="300">
                {% endif %}
            </div>
            <hr>
        {% endfor %}
    {% else %}
        <p>No files uploaded yet.</p>
    {% endif %}
</body>
</html>
